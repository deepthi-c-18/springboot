# =====================================================
# Spring Boot - Student Management System Configuration
# Java Version: 21
# =====================================================

# Application Name and Version
spring.application.name=Student Management System
app.version=1.0.0

# =====================================================
# Server Configuration
# =====================================================
server.port=8080
server.servlet.context-path=/
server.servlet.session.timeout=30m
server.compression.enabled=true
server.compression.min-response-size=1024

# =====================================================
# Database Configuration
# =====================================================
# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:studentdb}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# =====================================================
# JPA and Hibernate Configuration
# =====================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.batch_size=10
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.open-in-view=false

# =====================================================
# Thymeleaf Configuration (Template Engine)
# =====================================================
spring.thymeleaf.cache=false
spring.thymeleaf.enabled=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML

# =====================================================
# Static Resources Configuration
# =====================================================
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.period=3600

# =====================================================
# Logging Configuration
# =====================================================
logging.level.root=INFO
logging.level.com.studentapp=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.data=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/app.log
logging.file.max-size=10MB
logging.file.max-history=10

# =====================================================
# Error Handling
# =====================================================
server.error.include-message=always
server.error.include-stacktrace=on_param
server.error.include-exception=false

# =====================================================
# Application Metrics
# =====================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.metrics.export.simple.enabled=true

# =====================================================
# Jackson Configuration (JSON)
# =====================================================
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false

# =====================================================
# Servlet Configuration
# =====================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =====================================================
# Development Properties
# =====================================================
# Enable DevTools live reload
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=false

# =====================================================
# Actuator Configuration
# =====================================================
management.server.port=8081
management.endpoints.web.base-path=/actuator
