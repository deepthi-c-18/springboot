# =====================================================
# Ansible Inventory File - Student Management System
# =====================================================
# This file defines the hosts for deployment

[prod]
# Worker node - Deploy production containers here
# Change 192.168.1.100 to your actual worker node IP
worker-node-1 ansible_host=192.168.1.100 ansible_user=ubuntu ansible_port=22 ansible_ssh_private_key_file=/home/jenkins/.ssh/id_rsa

# Define group variables
[prod:vars]
# Connection settings
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no'

# Application settings
app_name=student-management-system
app_version=1.0.0
app_port=8085

# Database settings
db_host=mysql-db
db_port=3306
db_name=studentdb
db_user=student
db_password=student123
db_root_password=rootpassword

# Docker settings
docker_registry=docker.io
docker_image_name=student-management-system
docker_image_tag=latest

# Network settings
network_name=student-network

# Other settings
deployment_user=ubuntu
